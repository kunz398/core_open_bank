spring.application.name=ocbs
spring.profiles.active=dev

# --- App ------------------------------------------------------------------------------------
app.name=Open Source Core Banking System
app.short-name=OSCBS
app.secret-key=${APP_SECRET_KEY}

# --- JWT ------------------------------------------------------------------------------------
oscbs.jwt.secret=${JWT_SECRET}
oscbs.jwt.access-token-expiry=${JWT_ACCESS_EXPIRY}
oscbs.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY}

# --- Bootstrap Admin ------------------------------------------------------------------------------------
oscbs.bootstrap.username=${BOOTSTRAP_USERNAME}
oscbs.bootstrap.email=${BOOTSTRAP_EMAIL}
oscbs.bootstrap.password=${BOOTSTRAP_PASSWORD}

# --- Password Policy ------------------------------------------------------------------------------------
oscbs.security.password.min-length=${PASSWORD_MIN_LENGTH}
oscbs.security.password.max-length=${PASSWORD_MAX_LENGTH}
oscbs.security.password.require-uppercase=${PASSWORD_REQUIRE_UPPERCASE}
oscbs.security.password.require-lowercase=${PASSWORD_REQUIRE_LOWERCASE}
oscbs.security.password.require-digit=${PASSWORD_REQUIRE_DIGIT}
oscbs.security.password.require-special=${PASSWORD_REQUIRE_SPECIAL}
oscbs.security.password.history-count=${PASSWORD_HISTORY_COUNT}
oscbs.security.password.expiry-days=${PASSWORD_EXPIRY_DAYS}
oscbs.security.password.max-failed-attempts=${MAX_FAILED_ATTEMPTS}

# --- Server ------------------------------------------------------------------------------------
server.port=8080
server.address=localhost
server.servlet.context-path=/

# --- Database (PostgreSQL) ------------------------------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- Database Backup --------------------------------
spring.database.backup=true
spring.database.backup.path=db_backups
spring.database.backup.pgdump-path=C:\\Program Files\\PostgreSQL\\17\\bin\\pg_dump.exe

# --- SMTP ------------------------------------------------------------------------------------
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.from=${SMTP_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Twilio (SMS) ------------------------------------------------------------------------------------
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}
twilio.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID}

# --- Google OAuth2 ------------------------------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google


